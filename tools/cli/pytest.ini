[pytest]
# Pytest configuration for Prometheus CLI tests

# Test discovery settings
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output settings
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --cov=src/prometheus
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    github: GitHub API tests
    cli: CLI tests

# Timeout
timeout = 10
